name: cloakpix
description: CloakPix is a high-security private photo and video vault with camouflage mode and encrypted cloud backup.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  connectivity_plus: ^6.0.5
  cryptography: ^2.7.0
  crypto: ^3.0.5
  cupertino_icons: ^1.0.8
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  firebase_storage: ^12.3.2
  cloud_firestore: ^5.4.4
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2
  local_auth: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  sqflite_sqlcipher: ^3.1.0+1
  uuid: ^4.5.1
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
